<div class="container">
     <div class="header">
          <h1>Listopia</h1>
          <button class="add-btn" (click)="goToAdd()">
               + Add Book</button>
     </div>

<div class="book-row">
     
<div class="book-card" *ngFor="let book of books">

<!-- IMAGE -->
<div class="cover"
     (click)="goToDetail(book)">
<img [src]="book.pic" width="120">
</div>

<!-- TITLE -->
<div class="book-title clickable"
     (click)="goToDetail(book)">
{{book.title}}
</div>

<div class="author">
{{book.author}}
</div>

<div class="genre">
{{book.genre}}
</div>

<div class="year">
{{book.year}}
</div>
<button (click)="editBook(book.id)">Edit</button>
<button (click)="deleteBook(book.id)">Delete</button>
</div>

</div>

</div>
