<div class="row">
  <div class="col-12">

    @for(note of notes; track note.datef) {

      <mat-card class="m-b-16 p-16 note-post">

        <!-- HEADER -->
        <div class="d-flex align-items-center">

          <div class="avatar-circle">📝</div>

          <div class="m-l-8">
            <div class="f-w-600">Note</div>
            <div class="text-muted f-s-12">
              {{ note.datef | date:'medium' }}
            </div>
          </div>

        </div>

        <!-- CONTENT -->
        <div class="m-t-12 note-content">
          {{ note.title }}
        </div>

        <!-- ACTIONS -->
        <div class="d-flex align-items-center m-t-12">

          <!-- LIKE -->
          <button mat-button (click)="likeNote(note)">
            ❤️ {{ note.likes }}
          </button>

        </div>

        <!-- COMMENTS -->
        <div class="m-t-12">

          <mat-form-field appearance="outline" class="w-100">
            <input #commentInput matInput placeholder="Write a comment..." />
          </mat-form-field>

          <button mat-stroked-button color="primary"
            (click)="addComment(note, commentInput.value); commentInput.value=''">
            Comment
          </button>

          <!-- COMMENT LIST -->
          <div class="m-t-8">

            @for(c of note.comments; track c.date) {

              <div class="comment-box m-t-8 p-8">

                <div class="f-s-13">
                  {{ c.text }}
                </div>

                <div class="text-muted f-s-11">
                  {{ c.date | date:'short' }}
                </div>

              </div>

            }

          </div>

        </div>

      </mat-card>

    }

  </div>
</div>
