<div *ngIf="book" class="container">

  <!-- LEFT COLUMN -->
  <div class="left">

    <img [src]="book.imgSrc" class="cover" />

    <button class="btn">Want to Read</button>

    <div class="rating-box">
      <h4>Rate this book</h4>
      <span *ngFor="let s of [1,2,3,4,5]">★</span>
    </div>

    <div class="info">
      <p><strong>Author:</strong> {{ book.author }}</p>
      <p><strong>Pages:</strong> {{ book.pages }}</p>
      <p><strong>Published:</strong> {{ book.year }}</p>
    </div>

  </div>

  <!-- RIGHT COLUMN -->
  <div class="right">

    <h1>{{ book.title }}</h1>
    <h3>by {{ book.author }}</h3>

    <!-- rating -->
    <div class="rating">
      ⭐ {{ book.rating }} / 5
    </div>

    <!-- genres -->
    <div class="genres">
      <span *ngFor="let g of book.genres">{{ g }}</span>
    </div>

    <!-- description -->
    <p class="description">
      {{ book.description }}
    </p>

    <!-- REVIEWS -->
    <h2>Reviews</h2>

    <div class="review" *ngFor="let c of comments">
      <strong>{{ c.user }}</strong>
      <span class="stars">
        <span *ngFor="let s of getStars(c.rating)">★</span>
      </span>
      <p>{{ c.text }}</p>
    </div>

    <!-- add review -->
    <div class="add-review">
      <textarea [(ngModel)]="newComment"></textarea>
      <button (click)="addComment()">Post</button>
    </div>

  </div>

</div>
