<mat-card class="cardWithShadow theme-card">

  <mat-card-header>
    <mat-card-title>Edit Book</mat-card-title>
  </mat-card-header>

  <mat-card-content>

    <form [formGroup]="form" (ngSubmit)="updateBook()">

      <div class="row">

        <!-- LEFT -->
        <div class="col-8">

          <div class="row">

            <div class="col-6">
              <mat-form-field appearance="outline" class="w-100">
                <input matInput placeholder="Title" formControlName="title">
              </mat-form-field>
            </div>

            <div class="col-6">
              <mat-form-field appearance="outline" class="w-100">
                <input matInput placeholder="Author" formControlName="author">
              </mat-form-field>
            </div>

            <div class="col-6">
              <mat-form-field appearance="outline" class="w-100">
                <input matInput placeholder="Genre" formControlName="genre">
              </mat-form-field>
            </div>

            <div class="col-6">
              <mat-form-field appearance="outline" class="w-100">
                <input matInput type="number" placeholder="Year" formControlName="year">
              </mat-form-field>
            </div>

            <div class="col-6">
              <mat-form-field appearance="outline" class="w-100">
                <input matInput placeholder="Language" formControlName="langue">
              </mat-form-field>
            </div>

            <div class="col-6">
              <mat-form-field appearance="outline" class="w-100">
                <input matInput type="number" placeholder="Pages" formControlName="total_pages">
              </mat-form-field>
            </div>

          </div>

          <!-- DESCRIPTION -->
          <mat-form-field appearance="outline" class="w-100">
            <textarea matInput placeholder="Description" formControlName="description"></textarea>
          </mat-form-field>

        </div>

        <!-- RIGHT (IMAGES) -->
        <div class="col-4 text-center">

          <p>Current Image</p>
          <img [src]="oldImage || 'assets/default-book.png'" class="preview" width="200"
          height="300">
          <p class="mt-3">New Image</p>
          <img *ngIf="previewImage" [src]="previewImage" class="preview" width="200"
          height="300">

          <br><br>

          <input type="file" (change)="onFileSelected($event)">

        </div>

      </div>

      <button mat-flat-button color="primary" class="w-100 mt-3">
        Update Book
      </button>

    </form>

  </mat-card-content>

</mat-card>
